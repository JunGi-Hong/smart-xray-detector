spring.application.name=safe-guard

# DB Connection
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA Setting
spring.jpa.hibernate.ddl-auto=update

# MAKE CONSOLE SHOW SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Make CamelCase to snake_case
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# For SQL Version Compatibility
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# FOR KOREAN LANGUAGE
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# IMG SAVE LOCATION
file.upload.directory=C:/boot-camp/

# IMG SIZE LIMIT
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# FOR OAuth
kakao.client-id=${KAKAO_CLIENT_ID}
kakao.redirect-uri=${KAKAO_REDIRECT_URL}
kakao.client-secret=${KAKAO_CLIENT_SECRET}

# Django
django.api.url=${DJANGO_API_URL}
django.report.url=${DJANGO_REPORT_URL}

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=${EMAIL_PORT}
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true